{% if widget.is_initial %}
    <p class="mb-1 fw-bold">{{ widget.initial_text }}:</p>
    <a href="{{ widget.value.url }}" target="_blank">
        <img src="{{ widget.value.url }}"
            width="96"
            height="96"
            style="object-fit:cover; border-radius:4px;"
            alt="Current thumbnail">
    </a>
    {% if not widget.required %}
    <div class="form-check mt-2">
        <input class="form-check-input"
            type="checkbox"
            name="{{ widget.checkbox_name }}"
            id="{{ widget.checkbox_id }}">
        <label class="form-check-label text-danger" for="{{ widget.checkbox_id }}">
            {{ widget.clear_checkbox_label }}
        </label>
    </div>
    {% endif %}
    <p class="mt-2 mb-1">{{ widget.input_text }}</p>
{% endif %}
<input type="{{ widget.type }}"
    name="{{ widget.name }}"
    {% include "django/forms/widgets/attrs.html" %}>
