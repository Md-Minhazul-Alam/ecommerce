<nav class="sidebar" id="sidebar" role="navigation" aria-label="Mobile navigation" aria-hidden="true">
    <div class="sidebar-header">
        <h4 id="sidebar-title">Menu</h4>
        <button class="sidebar-close" 
            id="sidebarClose"
            aria-label="Close navigation menu"
            aria-controls="sidebar"
            aria-expanded="true">
            <i class="fas fa-times" aria-hidden="true"></i>
        </button>
    </div>

    <div class="sidebar-menu" role="menubar" aria-labelledby="sidebar-title">

        <!-- Home -->
        <a href="/" role="menuitem">Home</a>

        <!-- Categories -->
        {% for cat in menuCategories %}
            {% if cat.subcategories.all|length > 0 %}
                <div class="sidebar-dropdown" role="none">
                    <a href="{% url 'category' cat.category_slug %}"
                        role="menuitem"
                        aria-haspopup="true"
                        aria-expanded="false"
                        id="sidebar-cat-{{ cat.category_slug }}">
                        {{ cat.category }}
                        <span class="toggle-icon" aria-hidden="true">▼</span>
                    </a>
                    <div class="sidebar-submenu"
                        role="menu"
                        aria-labelledby="sidebar-cat-{{ cat.category_slug }}">
                        {% for sub in cat.subcategories.all %}
                            <a href="{% url 'category' sub.category_slug %}"
                                role="menuitem">
                                {{ sub.category }}
                            </a>
                        {% endfor %}
                    </div>
                </div>
            {% else %}
                <a href="{% url 'category' cat.category_slug %}"
                    role="menuitem">
                    {{ cat.category }}
                </a>
            {% endif %}
        {% endfor %}

        <!-- Shop -->
        <a href="{% url 'all_products' %}" role="menuitem">Shop</a>

    </div>
</nav>

<!-- Overlay -->
<div class="overlay" 
    id="overlay"
    role="presentation"
    aria-hidden="true">
</div>
